{% extends "base.html" %}
{% block title %}Главная{% endblock %}

{% block content %}
<div class="variant-box" style="max-width:600px; margin: 80px auto; text-align:center">
    <h1>👋 Добро пожаловать, {{ user_name }}!</h1>
    <p style="color:#666; margin-bottom:40px; font-size:16px">
        Система оценки компетенций PostgreSQL Security
    </p>

    <div style="display:flex; gap:20px; justify-content:center; flex-wrap:wrap">
        <a href="{{ url_for('select_variant') }}" class="dashboard-btn primary">
            🎯 Начать тестирование
        </a>
        <a href="{{ url_for('history') }}" class="dashboard-btn secondary">
            📊 Мои результаты
        </a>
    </div>
</div>

<style>
.dashboard-btn {
    display: inline-block;
    padding: 20px 35px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    transition: transform 0.2s, box-shadow 0.2s;
    min-width: 220px;
}
.dashboard-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}
.dashboard-btn.primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}
.dashboard-btn.secondary {
    background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%);
    color: white;
}
</style>
{% endblock %}
