{% extends "base.html" %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div class="login-box">
    <h1>🖥️ СИСТЕМА ОЦЕНКИ КОМПЕТЕНЦИЙ</h1>
    <h2>PostgreSQL Security</h2>
    
    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}
    
    <form method="POST">
        <div class="form-group">
            <label for="name">Имя специалиста:</label>
            <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
            <label for="access_code">Код доступа:</label>
            <input type="text" id="access_code" name="access_code" required>
        </div>
        
        <button type="submit">ВОЙТИ</button>
    </form>
    
    <p class="note">* Код доступа выдан администратором</p>
</div>
{% endblock %}
